name: Tests

on:
  push:
    branches: [master, master]
  pull_request:
    branches: [master, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install pytest pyyaml requests
          
      - name: Run tests
        working-directory: content-crawler
        run: |
          pytest test_crawler.py -v --tb=short
      
      - name: Run crawler (integration test)
        working-directory: content-crawler
        run: |
          timeout 60 python3 master.py || true
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
